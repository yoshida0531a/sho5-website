<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bluesky Updates - Shogo Fan Site</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, 'Yu Gothic', YuGothic, sans-serif;
      background-color: white; color: black;
    }
    .top-link {
      position: fixed;
      top: 10px;
      left: 20px;
      font-size: 24px;
      color: black;
      text-decoration: none;
      z-index: 1000;
      font-family: Arial, sans-serif;
    }
    .top-link:hover { text-decoration: underline; }
    header {
      text-align: center; font-size: 28px;
      font-weight: bold; margin: 20px 0;
    }
    .post-feed {
      width: calc(100% - 20px); max-width: 800px;
      margin: 0 auto; padding: 20px;
    }
    @media (max-width: 600px) {
      .post-feed { width: 100%; padding: 10px; }
    }
    #search {
      width: 100%; padding: 10px; font-size: 16px;
      margin-bottom: 20px; border: 1px solid #ccc;
      border-radius: 5px;
    }
    .post-item {
      border-bottom: 1px solid #ddd;
      margin-bottom: 15px; padding-bottom: 10px;
    }
    .post-item h3 { margin: 5px 0; font-size: 18px; }
    .post-item h3 a { color: black; text-decoration: none; }
    .post-item .date { margin: 5px 0; font-size: 12px; color: #666; }
    .post-item .post-text {
      margin: 10px 0; font-size: 14px; line-height: 1.5;
    }
    .post-link {
      display: inline-block;
      margin: 12px 0;
      padding: 8px 16px;
      background-color: transparent;
      color: #000;
      text-decoration: none;
      border: 2px solid #000;
      border-radius: 5px;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    .post-link:hover, .post-link:active, .post-link:focus {
      background-color: #FFD700;
      color: #000;
    }
    #more-posts-btn {
      display: block;
      margin: 20px auto;
      padding: 12px 24px;
      background-color: transparent;
      color: #000;
      border: 2px solid #000;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    #more-posts-btn:hover, #more-posts-btn:active, #more-posts-btn:focus {
      background-color: #FFD700;
      color: #000;
    }
    #more-posts-btn.hidden { display: none; }
    .scroll-to-top {
      position: fixed;
      bottom: 20px; right: 20px;
      width: 50px; height: 50px;
      background-color: rgba(0, 0, 0, 0.7);
      color: white; border: none; border-radius: 50%;
      font-size: 24px; cursor: pointer; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      transition: background-color 0.3s ease;
    }
    .scroll-to-top:hover { background-color: rgba(0, 0, 0, 0.9); }
    footer { text-align: center; font-size: 12px; margin: 20px 0; }
  </style>
</head>
<body>
  <a href="index.html" class="top-link">←</a>
  <header>Bluesky Updates</header>
  <section class="post-feed">
    <input type="text" id="search" placeholder="Search posts...">
    <div id="post-container">
      <!-- Posts will be loaded dynamically from bsky-data.txt -->
    </div>
    <button id="more-posts-btn">さらに過去の投稿を見る</button>
  </section>
  <footer>Copyright © 2023-2025 Akira Yoshida.</footer>
  <button class="scroll-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" title="トップに戻る">↑</button>
  <script>
    function formatDate(isoString) {
      if (!isoString) return '';
      try {
        return new Date(isoString).toLocaleString('ja-JP', {
          year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit',
          timeZone: 'Asia/Tokyo'
        });
      } catch { return ''; }
    }

    const searchInput = document.getElementById('search');
    const postContainer = document.getElementById('post-container');
    const morePostsBtn = document.getElementById('more-posts-btn');
    let postItems = [];
    let sortedPosts = [];

    fetch('bsky-data.txt')
      .then(response => response.json())
      .then(data => {
        data.forEach(post => {
          const postDiv = document.createElement('div');
          postDiv.className = 'post-item';
          postDiv.setAttribute('data-handle', post.handle || '');
          postDiv.setAttribute('data-text', post.text || '');
          postDiv.setAttribute('data-date', post.createdAt || '');

          postDiv.innerHTML = `
            <h3><a href="${post.postUrl}" target="_blank">@${post.handle}</a></h3>
            <p class="date">${formatDate(post.createdAt)}</p>
            <p class="post-text">${post.text}</p>
            <a href="${post.postUrl}" target="_blank" class="post-link">Blueskyで見る</a>
          `;

          postItems.push(postDiv);
        });

        sortedPosts = postItems.slice().sort((a, b) => {
          return new Date(b.getAttribute('data-date') || 0) - new Date(a.getAttribute('data-date') || 0);
        });

        sortedPosts.forEach(post => postContainer.appendChild(post));
        initializePagination();
      })
      .catch(error => {
        console.error('Error loading posts:', error);
        postContainer.innerHTML = '<p>投稿の読み込みに失敗しました。</p>';
      });

    const oneDayMs = 24 * 60 * 60 * 1000;
    const oneWeekMs = 7 * oneDayMs;
    let currentWeeksToShow = 0;
    let mostRecentDate = new Date();

    function initializePagination() {
      mostRecentDate = sortedPosts.length > 0
        ? new Date(sortedPosts[0].getAttribute('data-date'))
        : new Date();
      updateVisibility();
    }

    function updateVisibility() {
      const isSearching = searchInput.value.trim() !== '';

      if (isSearching) {
        const searchQuery = searchInput.value.trim().toLowerCase();
        sortedPosts.forEach(item => {
          const handle = item.getAttribute('data-handle');
          const text = item.getAttribute('data-text');
          item.style.display = (handle + ' ' + text).toLowerCase().includes(searchQuery) ? 'block' : 'none';
        });
        morePostsBtn.classList.add('hidden');
      } else {
        const mostRecentDayStart = new Date(
          mostRecentDate.getFullYear(),
          mostRecentDate.getMonth(),
          mostRecentDate.getDate()
        );

        const cutoffDate = currentWeeksToShow === 0
          ? new Date(mostRecentDayStart.getTime() - oneDayMs)
          : new Date(mostRecentDayStart.getTime() - (currentWeeksToShow * oneWeekMs));

        let hasMoreOldPosts = false;
        sortedPosts.forEach(item => {
          const postDate = new Date(item.getAttribute('data-date'));
          if (postDate >= cutoffDate) {
            item.style.display = 'block';
          } else {
            item.style.display = 'none';
            hasMoreOldPosts = true;
          }
        });

        if (hasMoreOldPosts) {
          morePostsBtn.classList.remove('hidden');
        } else {
          morePostsBtn.classList.add('hidden');
        }
      }
    }

    searchInput.addEventListener('input', updateVisibility);
    morePostsBtn.addEventListener('click', () => {
      currentWeeksToShow++;
      updateVisibility();
    });
  </script>
</body>
</html>
