<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fan Meter - 谷端将伍</title>
  <meta name="description" content="谷端将伍の応援ファンメーター。何回でもタップして今月の応援メーターを上げられます。">
  <link rel="canonical" href="https://sho5.org/fan-meter.html">
  <link rel="preload" as="image" href="assets/images/fan-meter-top5.jpg" type="image/jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background-color: white;
      color: black;
    }

    .top-link {
      position: fixed;
      top: 12px;
      left: 16px;
      font-size: 22px;
      color: black;
      text-decoration: none;
      z-index: 100;
    }

    header {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin: 20px 0;
    }

    .container {
      width: min(760px, calc(100% - 20px));
      margin: 0 auto 30px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) 220px;
      gap: 14px;
      align-items: end;
      border-radius: 10px;
      margin-bottom: 14px;
      background: linear-gradient(180deg, #fafafa 0%, #f0f0f0 100%);
      border: 1px solid rgba(0, 0, 0, 0.06);
      padding: 18px;
    }

    .hero-content {
      min-width: 0;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      color: #777;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 10vw, 58px);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 0;
      font-size: 15px;
      color: #555;
      line-height: 1.65;
    }

    .hero-media {
      position: relative;
      align-self: stretch;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      min-height: 200px;
    }

    .hero-visual {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }

    .speech-bubble {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 3;
      max-width: 180px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      font-size: 12px;
      line-height: 1.5;
      color: #222;
      opacity: 0;
      transform: translateY(6px) scale(0.96);
      transform-origin: top right;
      transition: opacity 0.24s ease, transform 0.24s ease;
      pointer-events: none;
    }

    .speech-bubble.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .speech-bubble::after {
      content: "";
      position: absolute;
      right: 18px;
      bottom: -8px;
      width: 14px;
      height: 14px;
      background: rgba(255, 255, 255, 0.94);
      border-right: 1px solid rgba(0, 0, 0, 0.08);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      transform: rotate(45deg);
    }

    .panel {
      background: #f7f7f7;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .meter-row {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 14px;
      align-items: stretch;
    }

    .meter-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
    }

    .meter-count {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 12px;
    }

    .meter-count strong {
      font-size: clamp(42px, 12vw, 68px);
      line-height: 0.9;
      letter-spacing: -0.05em;
    }

    .meter-count span {
      font-size: 14px;
      color: #666;
    }

    .meter-track {
      width: 100%;
      height: 16px;
      border-radius: 999px;
      background: #e1e1e1;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #111 0%, #444 100%);
      transition: width 0.45s ease;
    }

    .meter-caption {
      font-size: 12px;
      color: #666;
      line-height: 1.7;
    }

    .tap-card {
      background: #fff;
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 220px;
    }

    .tap-button {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 16px 18px;
      font: inherit;
      font-size: 16px;
      font-weight: 600;
      background: #111;
      color: #fff;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.2s ease, box-shadow 0.16s ease;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
    }

    .tap-button:hover {
      transform: translateY(-1px);
    }

    .tap-button.pulse {
      animation: tap-pop 0.45s ease;
    }

    .tap-button:disabled {
      cursor: default;
      transform: none;
      opacity: 0.44;
      box-shadow: none;
    }

    .tap-note {
      margin-top: 10px;
      font-size: 12px;
      color: #777;
      line-height: 1.6;
    }

    .status {
      min-height: 40px;
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
      color: #111;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
    }

    .stat-label {
      font-size: 10px;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 600;
      line-height: 1;
    }

    .history-title {
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 10px;
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-item {
      background: #fff;
      border-radius: 10px;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 88px 1fr auto auto;
      gap: 12px;
      align-items: center;
    }

    .history-month {
      font-size: 14px;
      font-weight: 600;
    }

    .history-bar {
      height: 10px;
      background: #ececec;
      border-radius: 999px;
      overflow: hidden;
    }

    .history-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #111 0%, #555 100%);
    }

    .history-value {
      font-size: 12px;
      color: #666;
      white-space: nowrap;
    }

    .foot-note {
      text-align: center;
      color: #999;
      font-size: 12px;
      line-height: 1.6;
      padding: 6px 12px 0;
    }

    @keyframes tap-pop {
      0% { transform: scale(1); }
      45% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    @media (max-width: 720px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .meter-row {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .hero-media {
        min-height: 0;
      }

      .hero h1 {
        font-size: clamp(28px, 15vw, 52px);
      }

      .hero p {
        font-size: 14px;
      }

      .speech-bubble {
        top: 8px;
        right: 8px;
      }
    }

    @media (max-width: 560px) {
      header {
        font-size: 24px;
      }

      .container {
        width: calc(100% - 16px);
      }

      .hero {
        padding: 14px;
      }

      .hero h1 {
        font-size: 48px;
        line-height: 0.98;
      }

      .hero p {
        font-size: 13px;
      }

      .hero-visual {
        border-radius: 10px;
      }

      .history-item {
        grid-template-columns: 1fr;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <a class="top-link" href="index.html">←</a>
  <header>Sho5 Fan Site</header>

  <div class="container">
    <section class="hero">
      <div class="hero-content">
        <div class="eyebrow">Monthly Support</div>
        <h1>Fan Meter</h1>
        <p>好きなだけ押せる応援ボタン。今月のクリック数がそのままメーターになって、月ごとの応援熱量も下に残ります。</p>
      </div>
      <div class="hero-media">
        <img class="hero-visual" src="assets/images/fan-meter-top5.jpg" alt="谷端将伍">
        <div class="speech-bubble" id="speech-bubble" aria-live="polite"></div>
      </div>
    </section>

    <section class="panel">
      <div class="meter-row">
        <div>
          <div class="meter-title">This Month&apos;s Taps</div>
          <div class="meter-count">
            <strong id="month-count">0</strong>
            <span>taps</span>
          </div>
          <div class="meter-track" aria-hidden="true">
            <div class="meter-fill" id="meter-fill"></div>
          </div>
          <div class="meter-caption" id="meter-caption">今月の応援が静かに積み上がっています。</div>
        </div>

        <div class="tap-card">
          <div>
            <div class="meter-title">Tap Freely</div>
            <button class="tap-button" id="tap-button" type="button">今日の応援を送る</button>
            <div class="status" id="status-text">読み込み中…</div>
          </div>
          <div class="tap-note">
            何回でもタップできます。
            <br>
            メーター自体は毎月 1 日にリセットされます。
          </div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Month Taps</div>
          <div class="stat-value" id="month-taps-stat">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Today Taps</div>
          <div class="stat-value" id="today-taps">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">All Time</div>
          <div class="stat-value" id="all-time-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Month</div>
          <div class="stat-value" id="month-label">--</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2 class="history-title">月別クリック履歴</h2>
      <div class="history-list" id="history-list"></div>
    </section>

    <div class="foot-note">
      ※ タップ数はリアルタイムで加算され、月初にリセットされます。
    </div>
  </div>

  <script>
    const API_URL = 'https://sho5-fan-meter.chjqnfv62h.workers.dev/api/fan-meter';
    const SPEECHES = [
      '趣味は睡眠です',
      '対戦したい相手は奥川さんです',
      '地元の自慢は大きな山があることです'
    ];

    const monthCountEl = document.getElementById('month-count');
    const monthTapsStatEl = document.getElementById('month-taps-stat');
    const todayTapsEl = document.getElementById('today-taps');
    const allTimeCountEl = document.getElementById('all-time-count');
    const monthLabelEl = document.getElementById('month-label');
    const meterFillEl = document.getElementById('meter-fill');
    const meterCaptionEl = document.getElementById('meter-caption');
    const buttonEl = document.getElementById('tap-button');
    const statusEl = document.getElementById('status-text');
    const historyListEl = document.getElementById('history-list');
    const speechBubbleEl = document.getElementById('speech-bubble');

    let currentDate = null;

    function formatNumber(value) {
      return new Intl.NumberFormat('ja-JP').format(value || 0);
    }

    function formatMonth(monthKey) {
      const [year, month] = monthKey.split('-');
      return `${year}/${month}`;
    }

    function setButtonState(disabled, label) {
      buttonEl.disabled = disabled;
      buttonEl.textContent = label;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function showSpeech() {
      const message = SPEECHES[Math.floor(Math.random() * SPEECHES.length)];
      speechBubbleEl.textContent = message;
      speechBubbleEl.classList.add('visible');
      clearTimeout(showSpeech.timeoutId);
      showSpeech.timeoutId = setTimeout(() => {
        speechBubbleEl.classList.remove('visible');
      }, 3200);
    }

    function pulseButton() {
      buttonEl.classList.remove('pulse');
      void buttonEl.offsetWidth;
      buttonEl.classList.add('pulse');
    }

    function renderHistory(history) {
      if (!history || history.length === 0) {
        historyListEl.innerHTML = '<div class="history-item"><div class="history-month">まだ履歴がありません</div></div>';
        return;
      }

      const maxTapCount = Math.max(...history.map(item => item.tapCount), 1);
      historyListEl.innerHTML = history.map(item => {
        const width = Math.max(6, Math.round((item.tapCount / maxTapCount) * 100));
        return `
          <div class="history-item">
            <div class="history-month">${formatMonth(item.month)}</div>
            <div class="history-bar"><div class="history-bar-fill" style="width:${width}%"></div></div>
            <div class="history-value">${formatNumber(item.tapCount)} taps</div>
          </div>
        `;
      }).join('');
    }

    function setReadyState() {
      setButtonState(false, '応援を送る');
      setStatus('何回でもタップできます。');
    }

    function updateMeter(data) {
      currentDate = data.date;
      monthCountEl.textContent = formatNumber(data.monthTapCount);
      monthTapsStatEl.textContent = formatNumber(data.monthTapCount);
      todayTapsEl.textContent = formatNumber(data.todayTapCount);
      allTimeCountEl.textContent = formatNumber(data.allTimeTapCount);
      monthLabelEl.textContent = formatMonth(data.month);
      meterFillEl.style.width = `${Math.max(2, data.progressPercent || 0)}%`;

      if (data.monthTapCount === 0) {
        meterCaptionEl.textContent = '今月の最初のクリックを待っています。';
      } else if (data.monthTapCount < data.monthlyGoal) {
        meterCaptionEl.textContent = `今月の目標 ${formatNumber(data.monthlyGoal)} クリックまであと ${formatNumber(data.monthlyGoal - data.monthTapCount)}。`;
      } else {
        meterCaptionEl.textContent = '今月の目標を突破しました。応援の勢いが続いています。';
      }

      renderHistory(data.history || []);
      setReadyState();
    }

    async function loadMeter() {
      try {
        const response = await fetch(API_URL, { method: 'GET' });
        if (!response.ok) throw new Error('load failed');
        const data = await response.json();
        updateMeter(data);
      } catch (error) {
        console.error(error);
        setButtonState(true, '接続できません');
        setStatus('データの取得に失敗しました。時間をおいて再度お試しください。');
      }
    }

    async function tapMeter() {
      pulseButton();
      showSpeech();

      setButtonState(true, '送信中…');
      setStatus('応援を送っています…');

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ source: 'fan-meter-page' })
        });
        if (!response.ok) throw new Error('tap failed');
        const data = await response.json();
        updateMeter(data);
        setStatus(data.message || '応援を受け付けました。');
        setButtonState(false, 'もう一度応援する');
      } catch (error) {
        console.error(error);
        setButtonState(false, '今日の応援を送る');
        setStatus('送信に失敗しました。通信環境の良い場所で再度お試しください。');
      }
    }

    buttonEl.addEventListener('click', tapMeter);
    loadMeter();
  </script>
</body>
</html>
