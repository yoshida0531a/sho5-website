<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results - 谷端将伍</title>
  <meta name="description" content="谷端将伍の試合結果。オープン戦・公式戦の打撃成績とゲームログ。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', Meiryo, sans-serif;
      background-color: white;
      color: black;
    }

    .top-link {
      position: fixed;
      top: 12px;
      left: 16px;
      font-size: 22px;
      color: black;
      text-decoration: none;
      z-index: 100;
    }

    header {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      padding: 16px 0 8px;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 12px 40px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 2px solid #000;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 0;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      color: #888;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }

    .tab-btn.active {
      color: #000;
      border-bottom-color: #000;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Stats card ── */
    .stats-card {
      background: #f8f8f8;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 20px;
    }

    .stats-card-title {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      text-align: center;
    }

    .stat-label {
      font-size: 10px;
      color: #777;
      margin-bottom: 2px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
    }

    .stat-value.highlight {
      font-size: 22px;
    }

    /* ── Game log ── */
    .section-title {
      font-size: 15px;
      font-weight: 600;
      margin: 4px 0 10px;
    }

    .no-games {
      text-align: center;
      color: #999;
      font-size: 14px;
      padding: 30px 0;
    }

    .game-card {
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .game-date {
      font-size: 12px;
      color: #777;
    }

    .game-matchup {
      font-size: 15px;
      font-weight: 600;
    }

    .game-score {
      font-size: 14px;
      font-weight: 700;
    }

    .result-win  { color: #c0392b; }
    .result-lose { color: #1e6bbf; }
    .result-draw { color: #888; }

    .game-stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .game-stat {
      font-size: 13px;
      color: #555;
    }

    .game-stat strong {
      color: #000;
    }

    /* ── Heatmap ── */
    .heatmap-section {
      margin-top: 24px;
    }

    .heatmap-title {
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 10px;
    }

    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      max-width: 270px;
      margin: 0 auto 10px;
    }

    .heatmap-cell {
      aspect-ratio: 1;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px;
    }

    .cell-avg {
      font-size: clamp(14px, 4vw, 20px);
      font-weight: 700;
      line-height: 1;
      margin-bottom: 2px;
    }

    .cell-detail {
      font-size: clamp(8px, 2vw, 10px);
      color: #555;
      text-align: center;
      line-height: 1.3;
    }

    .avg-0  { background: #ffffff; }
    .avg-1  { background: #fff9e6; }
    .avg-2  { background: #fff3cc; }
    .avg-3  { background: #ffecb3; }
    .avg-4  { background: #ffe699; }
    .avg-5  { background: #ffe080; }
    .avg-6  { background: #ffdb66; }
    .avg-7  { background: #ffd54d; }
    .avg-8  { background: #ffcf33; }
    .avg-9  { background: #ffc61a; }
    .avg-10 { background: #ffc000; }

    .legend {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 11px;
      color: #777;
    }

    .legend-box {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.1);
      display: inline-block;
    }

    /* ── Season avg hero ── */
    .season-avg-hero {
      text-align: center;
      padding: 16px 0 6px;
    }

    .season-avg-label {
      font-size: 10px;
      font-weight: 600;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }

    .season-avg-value {
      font-size: clamp(42px, 14vw, 64px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    /* ── Stat item ── */
    .stat-item {
      background: white;
      border-radius: 8px;
      padding: 8px 4px;
    }

    /* ── Misc ── */
    .last-updated {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      margin-top: 20px;
    }

    .loading {
      text-align: center;
      padding: 60px 0;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <a class="top-link" href="index.html">←</a>
  <header>Results</header>

  <div class="container">
    <div id="loading" class="loading">読み込み中…</div>

    <div id="main-content" style="display:none;">
      <div class="tabs">
        <button class="tab-btn active" data-tab="spring">オープン戦</button>
        <button class="tab-btn" data-tab="regular">公式戦</button>
      </div>

      <!-- Spring Training -->
      <div class="tab-panel active" id="tab-spring">
        <div class="season-avg-hero">
          <div class="season-avg-label">シーズン打率</div>
          <div class="season-avg-value" id="spring-avg-hero" aria-label="オープン戦シーズン打率" role="status">--</div>
        </div>
        <div class="stats-card">
          <div class="stats-card-title">シーズン成績</div>
          <div class="stats-row" id="spring-summary"></div>
        </div>
        <div class="section-title">試合結果</div>
        <div id="spring-games"></div>
      </div>

      <!-- Regular Season -->
      <div class="tab-panel" id="tab-regular">
        <div class="season-avg-hero">
          <div class="season-avg-label">シーズン打率</div>
          <div class="season-avg-value" id="regular-avg-hero" aria-label="公式戦シーズン打率" role="status">--</div>
        </div>
        <div class="stats-card">
          <div class="stats-card-title">シーズン成績</div>
          <div class="stats-row" id="regular-summary"></div>
        </div>
        <div class="section-title">試合結果</div>
        <div id="regular-games"></div>

        <div class="heatmap-section" id="heatmap-section" style="display:none;">
          <div class="heatmap-title">コース別打率</div>
          <div class="heatmap-grid" id="heatmap"></div>
          <div class="legend">
            <div class="legend-box" style="background:#ffffff;"></div>
            <span>.000</span>
            <span>→</span>
            <div class="legend-box" style="background:#ffc000;"></div>
            <span>.400+</span>
          </div>
        </div>
      </div>

      <div class="last-updated" id="last-updated"></div>
    </div>
  </div>

  <script>
    /* Tab switching */
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    /* Heat colour class */
    function avgClass(avgStr) {
      const v = parseFloat(avgStr);
      if (!v) return 'avg-0';
      if (v < 0.050) return 'avg-1';
      if (v < 0.100) return 'avg-2';
      if (v < 0.150) return 'avg-3';
      if (v < 0.200) return 'avg-4';
      if (v < 0.250) return 'avg-5';
      if (v < 0.300) return 'avg-6';
      if (v < 0.350) return 'avg-7';
      if (v < 0.400) return 'avg-8';
      if (v < 0.450) return 'avg-9';
      return 'avg-10';
    }

    function safe(v, fb = '--') { return (v === null || v === undefined) ? fb : v; }

    /* Set season batting average hero display */
    function renderAvgHero(heroId, s) {
      const el = document.getElementById(heroId);
      if (!el) return;
      const avg = s && s.avg;
      el.textContent = (avg && /^\.\d{3}$/.test(avg)) ? avg : '--';
    }

    /* Render stats summary */
    function renderSummary(id, s) {
      const fields = [
        { label: '試合',   key: 'games' },
        { label: '打率',   key: 'avg',  hl: true },
        { label: '本塁打', key: 'hr' },
        { label: '打点',   key: 'rbi' },
        { label: '打席',   key: 'pa' },
        { label: '安打',   key: 'h' },
        { label: '四球',   key: 'bb' },
        { label: '三振',   key: 'so' },
      ];
      document.getElementById(id).innerHTML = fields.map(f =>
        `<div class="stat-item">
           <div class="stat-label">${f.label}</div>
           <div class="stat-value${f.hl ? ' highlight' : ''}">${safe(s[f.key])}</div>
         </div>`
      ).join('');
    }

    /* Render game log */
    function renderGames(id, games) {
      const el = document.getElementById(id);
      if (!games || games.length === 0) {
        el.innerHTML = '<div class="no-games">試合データはまだありません</div>';
        return;
      }
      const sorted = [...games].sort((a, b) => b.date.localeCompare(a.date));
      el.innerHTML = sorted.map(g => {
        const rc =
          g.result === 'W' ? 'result-win' :
          g.result === 'L' ? 'result-lose' :
          g.result === 'D' ? 'result-draw' : '';

        const rl =
          g.result === 'W' ? '勝' :
          g.result === 'L' ? '敗' :
          g.result === 'D' ? '分' : '結果未取得';

        const hasScore = Number.isFinite(g.score_us) && Number.isFinite(g.score_them);
        const scoreText = hasScore ? `${g.score_us}-${g.score_them}` : '--';

        const date = (g.date || '').replace(/-/g, '/');
        const ab = safe(g.ab, 0);
        const h  = safe(g.h,  0);
        const gameAvg = (g.ab > 0) ? (g.h / g.ab).toFixed(3).replace(/^0\./, '.') : '--';
        const extras = [];
        if (g.hr  > 0) extras.push(`${g.hr}本塁打`);
        if (g.rbi > 0) extras.push(`${g.rbi}打点`);
        if (g.bb  > 0) extras.push(`${g.bb}四球`);
        if (g.sb  > 0) extras.push(`${g.sb}盗塁`);
        if (g.so  > 0) extras.push(`${g.so}三振`);
        return `<div class="game-card">
          <div class="game-header">
            <div>
              <div class="game-date">${date}</div>
              <div class="game-matchup">vs ${safe(g.opponent, '?')}</div>
            </div>
            <div class="game-score ${rc}">${rl} ${scoreText}</div>
          </div>
          <div class="game-stats">
            <div class="game-stat"><strong>${h}安打 ${ab}打数</strong></div>
            <div class="game-stat">打率 <strong>${gameAvg}</strong></div>
            ${extras.map(e => `<div class="game-stat"><strong>${e}</strong></div>`).join('')}
          </div>
        </div>`;
      }).join('');
    }

    /* Render heatmap */
    function renderHeatmap(cells) {
      if (!cells || cells.length === 0) return;
      document.getElementById('heatmap').innerHTML = cells.map(c =>
        `<div class="heatmap-cell ${avgClass(c.avg)}">
           <div class="cell-avg">${c.avg}</div>
           <div class="cell-detail">${c.h}-${c.ab}${c.bb_hbp > 0 ? '<br>四死球' + c.bb_hbp : ''}</div>
         </div>`
      ).join('');
      document.getElementById('heatmap-section').style.display = 'block';
    }

    /* Fetch and render */
    async function loadData() {
      try {
        const res = await fetch('/data/results.json');
        if (!res.ok) throw new Error('fetch failed');
        const data = await res.json();

        const st = data.spring_training  || {};
        const rs = data.regular_season   || {};

        renderAvgHero('spring-avg-hero',  st.summary || {});
        renderSummary('spring-summary', st.summary || {});
        renderGames('spring-games', st.games || []);

        renderAvgHero('regular-avg-hero', rs.summary || {});
        renderSummary('regular-summary', rs.summary || {});
        renderGames('regular-games', rs.games || []);
        renderHeatmap(rs.heatmap || []);

        if (data.last_updated) {
          document.getElementById('last-updated').textContent =
            '最終更新: ' + data.last_updated.replace(/-/g, '/');
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
      } catch (e) {
        document.getElementById('loading').textContent = 'データの読み込みに失敗しました';
        console.error(e);
      }
    }

    loadData();
  </script>
</body>
</html>
