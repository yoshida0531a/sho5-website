<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results - 谷端将伍</title>
  <meta name="description" content="谷端将伍の試合結果。ファーム成績と直近試合の打点を表示。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', Meiryo, sans-serif;
      background: #fff;
      color: #111;
    }
    .top-link {
      position: fixed;
      top: 12px;
      left: 16px;
      font-size: 22px;
      color: #000;
      text-decoration: none;
      z-index: 100;
    }
    header {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      padding: 16px 0 8px;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 12px 40px;
    }
    .info-card, .stats-card {
      background: #f8f8f8;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 18px;
      border: 1px solid #ececec;
    }
    .stats-card-title {
      font-size: 12px;
      font-weight: 700;
      color: #555;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .live-title {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
    }
    .live-text {
      margin: 0 0 10px;
      font-size: 13px;
      color: #444;
      line-height: 1.6;
    }
    .live-link {
      color: #0057cc;
      word-break: break-all;
    }
    .steps {
      margin: 0;
      padding-left: 18px;
      font-size: 13px;
      color: #333;
      line-height: 1.7;
    }
    .steps a { color: #0057cc; }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .stat-item {
      background: #fff;
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
    }
    .stat-label {
      font-size: 10px;
      color: #777;
      margin-bottom: 2px;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }
    .game-card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #ececec;
      padding: 10px 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .game-date {
      font-size: 12px;
      color: #666;
      margin-bottom: 2px;
    }
    .game-opponent {
      font-size: 14px;
      font-weight: 600;
    }
    .game-rbi {
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
    }
    .section-title {
      font-size: 15px;
      font-weight: 600;
      margin: 2px 0 10px;
    }
    .source-note {
      font-size: 11px;
      color: #888;
      margin-top: 10px;
      line-height: 1.5;
    }
    .source-note a { color: #666; }
    .no-data {
      text-align: center;
      color: #999;
      font-size: 14px;
      padding: 24px 0;
    }
    .last-updated {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      margin-top: 16px;
    }
    .loading {
      text-align: center;
      padding: 60px 0;
      color: #aaa;
      font-size: 14px;
    }
    @media (max-width: 520px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <a class="top-link" href="index.html">←</a>
  <header>Results</header>

  <div class="container">
    <div class="info-card">
      <h2 class="live-title">Live result</h2>
      <p class="live-text">試合中の通知はDiscordで配信しています。参加リンク: <a class="live-link" href="https://discord.gg/EtvACvf46" target="_blank" rel="noopener noreferrer">https://discord.gg/EtvACvf46</a></p>
      <ol class="steps">
        <li>Discordをインストール: <a href="https://discord.com/download" target="_blank" rel="noopener noreferrer">PC版</a> / <a href="https://apps.apple.com/app/discord-chat-talk-hangout/id985746746" target="_blank" rel="noopener noreferrer">iOS</a> / <a href="https://play.google.com/store/apps/details?id=com.discord" target="_blank" rel="noopener noreferrer">Android</a></li>
        <li>アカウントを作成してログイン</li>
        <li>上の招待リンクを開いてサーバーに参加</li>
        <li>参加後、通知をONにする（サーバー名右クリック/長押し → 通知設定）</li>
      </ol>
    </div>

    <div id="loading" class="loading">読み込み中…</div>

    <div id="main-content" style="display:none;">
      <div class="stats-card">
        <div class="stats-card-title">シーズン成績（ファーム）</div>
        <div class="stats-row" id="farm-summary"></div>
        <div class="source-note">引用元: <a href="https://baseball.yahoo.co.jp/npb/player/2118999/top" target="_blank" rel="noopener noreferrer">Yahoo!スポーツナビ</a></div>
      </div>

      <div class="stats-card">
        <div class="stats-card-title">試合結果</div>
        <div class="section-title">直近3試合（打点のみ）</div>
        <div id="recent-games"></div>
        <div class="source-note">引用元: <a href="https://baseball.yahoo.co.jp/npb/player/2118999/top" target="_blank" rel="noopener noreferrer">Yahoo!スポーツナビ</a></div>
      </div>

      <div class="last-updated" id="last-updated"></div>
    </div>
  </div>

  <script>
    const RESULTS_DATA_URL = 'data/results.json';

    function renderFarmStats(items) {
      const el = document.getElementById('farm-summary');
      el.innerHTML = items.map(item =>
        `<div class="stat-item"><div class="stat-label">${item.label}</div><div class="stat-value">${item.value}</div></div>`
      ).join('');
    }

    function renderGames(games) {
      const el = document.getElementById('recent-games');
      if (!games.length) {
        el.innerHTML = '<div class="no-data">試合データはまだありません</div>';
        return;
      }
      el.innerHTML = games.map(g =>
        `<div class="game-card"><div><div class="game-date">${g.date}</div><div class="game-opponent">vs ${g.opponent}</div></div><div class="game-rbi">打点 ${g.rbi}</div></div>`
      ).join('');
    }

    async function loadData() {
      try {
        const res = await fetch(RESULTS_DATA_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error('結果データの取得に失敗しました');
        const data = await res.json();

        const farmStats = data.farmSummary?.display || [];
        const recentGames = (data.recentGames || []).slice(0, 3);

        renderFarmStats(farmStats);
        renderGames(recentGames);

        document.getElementById('last-updated').textContent =
          `最終更新: ${(data.lastUpdated || '').replaceAll('-', '/')}`;

        document.getElementById('loading').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
      } catch (e) {
        document.getElementById('loading').textContent = 'データの読み込みに失敗しました';
        console.error(e);
      }
    }

    loadData();
  </script>
</body>
</html>
